<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hashgate | Verifica di Sicurezza</title>
    <style>
        /* Reset di base per garantire il full-page */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #0e0e0e; /* Sfondo scuro richiesto */
            color: #d9d9d9;
            font-family: -apple-system, system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Previene barre di scorrimento indesiderate */
        }

        /* Contenitore principale centrato */
        .main-challenge-container {
            text-align: center;
            padding: 20px;
            max-width: 400px;
            width: 90%;
        }

        /* Stile per il logo ufficiale */
        .hashgate-logo {
            max-width: 200px;
            height: auto;
            margin-bottom: 40px;
        }

        /* Stile per i titoli */
        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
        }

        /* Stile per il sottotitolo/descrizione */
        .description {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #8c8c8c;
            margin-bottom: 30px;
        }

        /* Area del widget */
        .widget-area {
            min-height: 100px; /* Spazio per il caricamento del widget */
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="main-challenge-container">
        <img src="https://api.hashgate.net/cdn/static/logo.webp" alt="Hashgate Logo" class="hashgate-logo">

        <h1>Verifica della connessione</h1>
        <p class="description">
            Stiamo verificando la sicurezza della tua connessione. Questo processo è automatico e richiede solo un istante.
        </p>

        <div class="widget-area">
            <div id="hashgate-container" data-mode="redirect" data-sitekey="pk_live_1234"></div>
        </div>
    </div>

    <script src="https://api.hashgate.net/cdn/javascript/hashgate.js"></script>

</body>
</html>
