<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <script src="https://api.hashgate.net/cdn/hashgate.js"></script>
    <style>
        body { margin: 0; padding: 10px; display: flex; align-items: center; justify-content: center; background: transparent; }
    </style>
</head>
<body>
    <script>
        // Leggiamo i parametri dall'URL
        const urlParams = new URLSearchParams(window.location.search);
        const siteKey = urlParams.get('sitekey') || 'pk_live_1234'; // API Key di default
        const theme = urlParams.get('theme') || 'modern-dark';

        // Creiamo e iniettiamo il div container primordiale
        const container = document.createElement('div');
        container.id = 'hashgate-container';
        container.setAttribute('data-sitekey', siteKey);
        container.setAttribute('data-theme', theme);
        container.setAttribute('data-mode', 'form'); // default per demo
        
        document.body.appendChild(container);
    </script>

<script src="https://api.hashgate.net/cdn/javascript/hashgate.js?v=mailsense9"></script>
</body>
</html>
